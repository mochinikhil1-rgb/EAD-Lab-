<!DOCTYPE html>
<html>
<head>
    <title>Chess Board</title>

    <style>
        /* Chessboard container */
        #board {
            width: 320px;
            height: 320px;
            border: 2px solid black;
        }

        /* Common box style */
        .box {
            width: 40px;
            height: 40px;
            float: left;
        }

        /* White box */
        .white {
            background-color: white;
        }

        /* Black box */
        .black {
            background-color: black;
        }
    </style>
</head>
<body>

<h2>Chess Board Pattern</h2>

<div id="board">
    <!-- Row 1 -->
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>

    <!-- Row 2 -->
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>

    <!-- Repeat same pattern for remaining rows -->
    <!-- Row 3 -->
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>

    <!-- Row 4 -->
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>

    <!-- Row 5 -->
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>

    <!-- Row 6 -->
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>

    <!-- Row 7 -->
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>

    <!-- Row 8 -->
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
</div>
187
</body>
</html>
